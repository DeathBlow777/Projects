<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaEval - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body, html {
            font-family: 'Poppins', sans-serif;
            height: 100%;
            margin: 0;
        }

        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000000, #585656,#201e1e,#161515 );
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) blur(2px);
            z-index: -1;
        }

        .login-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
            padding: 0;
            width: 1000px;
            max-width: 90%;
            margin: 0 auto;
            justify-content: center;
            align-items: center;
        }

        .login-left {
            width: 50%;
            height: 600px;
            background: linear-gradient(
                135deg,
                #a065ff,
                #2e0c6b,
                #8c46f6,
                #401b85,
                #9e75ea,
                #a065ff
            );
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-radius: 0.5rem 0 0 0.5rem;
            transition: all 0.5s ease-in-out;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 0%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }

        .login-right {
            width: 50%;
            height: 600px;
            background: #1b1a1e;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-radius: 0 0.5rem 0.5rem 0;
            transition: all 0.5s ease-in-out;
        }

        .password-row {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-bottom: 0.4rem;
        }

        .password-field {
            flex: 1;
        }

        .login-card {
            color: white;
            width: 100%;
            padding-top: 0.5rem;
            display: flex;
            flex-direction: column;
        }

        .text-right {
            text-align: right;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
            color: white;
            text-align: right;
        }

        .login-subtitle {
            color: #a0aec0;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            text-align: right;
        }

        .form-input {
            width: 100%;
            padding: 0.5rem 1rem;
            margin-bottom: 0.4rem;
            background-color: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 0.375rem;
            color: white;
            outline: none;
        }

        .form-input:focus {
            border-color: #8c4eff;
            box-shadow: 0 0 0 3px rgba(140, 78, 255, 0.3);
        }

        .form-label {
            display: block;
            margin-bottom: 0.2rem;
            color: #e2e8f0;
            font-size: 0.875rem;
        }

        .login-btn {
            width: 100%;
            padding: 0.5rem;
            background-color: #8c4eff;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.4rem;
            margin-bottom: 0.4rem;
        }

        .login-btn:hover {
            background-color: #7c3aff;
            transform: translateY(-2px);
        }

        .register-link, .login-link {
            margin-top: 0.5rem;
            text-align: center;
            color: #a0aec0;
            font-size: 0.875rem;
        }

        .register-link a, .login-link a {
            color: #8c4eff;
            text-decoration: none;
        }

        .register-link a:hover, .login-link a:hover {
            text-decoration: underline;
        }

        .welcome-text {
            padding: 1.75rem;
            max-width: 420px;
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 250px;
        }

        .welcome-title1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .welcome-title {
            font-family: "ZCOOL QingKe HuangYou", sans-serif;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
        }

        .welcome-subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1.75rem;
            font-size: 1.1rem;
        }

        .illustration {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            max-width: 300px;
            z-index: 1;
            animation: floatingAnimation 3s ease-in-out infinite;
        }

        @keyframes floatingAnimation {
            0% {
                transform: translate(-50%, 0px);
            }
            50% {
                transform: translate(-50%, -15px);
            }
            100% {
                transform: translate(-50%, 0px);
            }
        }

        .register-container {
            animation: slideInFromRight 0.5s forwards;
        }

        @keyframes slideInFromRight {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Role selection row styling */
        .role-section {
            display: flex;
            width: 100%;
            margin-bottom: 0.4rem;
            gap: 0.5rem;
        }

        .role-options {
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        .role-fields {
            width: 50%;
            padding-left: 0.5rem;
        }

        .role-container {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 0.1rem;
        }

        .radio-input {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #4a5568;
            border-radius: 50%;
            margin-right: 0.5rem;
            display: grid;
            place-content: center;
        }

        .radio-input::before {
            content: "";
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.15s;
            box-shadow: inset 1rem 1rem #8c4eff;
        }

        .radio-input:checked::before {
            transform: scale(1);
        }

        .radio-input:focus {
            outline: 2px solid rgba(140, 78, 255, 0.3);
        }

        #register-form {
            padding-bottom: 0;
            margin-top: 0;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        /* Additional responsive styles */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 90%;
                max-width: 400px;
            }
            .login-left, .login-right {
                width: 100%;
                border-radius: 0;
                height: auto;
            }
            .login-left {
                display: none;
            }
            .login-right {
                border-radius: 0.5rem;
                padding: 2rem;
            }
            .role-section {
                flex-direction: column;
            }
            .role-options, .role-fields {
                width: 100%;
                padding-left: 0;
            }
            .role-fields {
                margin-top: 0.75rem;
            }
            .password-row {
                flex-direction: column;
                gap: 0.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background for the whole page -->
    <div class="page-background"></div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
    
    <div class="login-container">
        <!-- Left side with welcome message -->
        <div class="login-left">
            <!-- Welcome text centered above the image -->
            <div class="welcome-text">
                <h2 class="welcome-title1">Welcome to</h2>
                <h2 class="welcome-title">VidhyaEval</h2>
                <p class="welcome-subtitle">Create your account to get started</p>
            </div>
            
            <!-- Add student illustration at the bottom -->
            <img src="/static/Smart_Ai_Chatbots__1_-removebg-preview.png" alt="Students using tablet" class="illustration">
        </div>
        
        <!-- Right side with registration form -->
        <div class="login-right">
            <div class="login-card register-container">
                <div class="text-right">
                    <h1 class="login-title">Register</h1>
                    <p class="login-subtitle">Create your account</p>
                </div>

                <form id="register-form" method="post" action="/register">
                    <div class="mb-1">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" id="fullname" class="form-input" placeholder="Enter your full name">
                    </div>
                    
                    <div class="mb-1">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email">
                    </div>
                    
                    <div class="password-row">
                        <div class="password-field">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="Create a password">
                        </div>
                        <div class="password-field">
                            <label for="confirm-password" class="form-label">Confirm Password</label>
                            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password">
                        </div>
                    </div>
                    
                    <!-- Role selection with side-by-side layout -->
                    <div class="role-section">
                        <div class="role-options">
                            <label class="form-label">Select Role</label>
                            <div class="role-container">
                                <label class="radio-label">
                                    <input type="radio" id="role-student" name="role" value="student" class="radio-input">
                                    <span>Student</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" id="role-teacher" name="role" value="teacher" class="radio-input">
                                    <span>Teacher</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="role-fields">
                            <div id="student-fields" class="hidden">
                                <label for="enrollment" class="form-label">Roll Number</label>
                                <input type="text" id="enrollment" class="form-input" placeholder="Enter roll number">
                            </div>
                            
                            <div id="teacher-fields" class="hidden">
                                <label for="department" class="form-label">Department</label>
                                <input type="text" id="department" class="form-input" placeholder="Enter department">
                            </div>
                        </div>
                    </div>
                    
                    <div id="register-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-md text-sm"></div>
                    
                    <button id="register-btn" class="login-btn">
                        Register
                    </button>
                    
                    <div class="login-link">
                        <p>Already have an account? <a href="/index">Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Handle Enter key press to move to next input field
        const inputFields = [
            'fullname',
            'email',
            'password',
            'confirm-password',
            'role-student',
            'role-teacher',
            'enrollment',
            'department'
        ];

        inputFields.forEach((fieldId, index) => {
            const currentField = document.getElementById(fieldId);
            if (currentField) {
                currentField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault(); // Prevent form submission
                        
                        // Find the next visible input field
                        let nextIndex = index + 1;
                        let nextField = null;
                        
                        while (nextIndex < inputFields.length) {
                            const nextElement = document.getElementById(inputFields[nextIndex]);
                            if (nextElement && 
                                !nextElement.parentElement.classList.contains('hidden') && 
                                nextElement.offsetParent !== null) {
                                nextField = nextElement;
                                break;
                            }
                            nextIndex++;
                        }

                        // If next field exists, focus on it
                        if (nextField) {
                            nextField.focus();
                        } else {
                            // If no next field, trigger the register button
                            document.getElementById('register-btn').click();
                        }
                    }
                });
            }
        });

        // Show/hide role-specific fields based on selection
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('student-fields').classList.add('hidden');
                document.getElementById('teacher-fields').classList.add('hidden');
                
                if (this.value === 'student') {
                    document.getElementById('student-fields').classList.remove('hidden');
                } else if (this.value === 'teacher') {
                    document.getElementById('teacher-fields').classList.remove('hidden');
                }
            });
        });
    </script>

    <!-- Remove Firebase scripts -->
    <script src="/static/auth.js"></script>
</body>
</html>
